<VirtualHost *:80>
    ServerName projectegrupb.es
    ServerAlias app.projectegrupb.es app localhost
    
    DocumentRoot /home/app/ftp/public
    <Directory /home/app/ftp/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /home/app/logs/error.log
    CustomLog /home/app/logs/access.log combined
</VirtualHost>
