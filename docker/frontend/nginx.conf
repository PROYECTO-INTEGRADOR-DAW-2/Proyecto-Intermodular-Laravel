# 1. Bloc per a l'App (Vue + API Laravel)
server {
    listen 80;
    server_name app.projectegrupb.es;

    location / {
        root   /usr/share/nginx/html; # On està el build de Vue
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Passem les crides d'API al contenidor de Laravel (Apache/PHP)
    location /api {
        proxy_pass http://app:80; # "app" és el nom del servei al docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 2. Bloc per als Backups
server {
    listen 80;
    server_name backup.projectegrupb.es;

    location / {
        proxy_pass http://app:80; # L'Apache del backend encara sap gestionar la carpeta de fitxers
        proxy_set_header Host $host;
    }

    # Habilitar Gzip
    gzip on;

    # Nivel de compresión (1-9). 5 o 6 es el equilibrio perfecto entre CPU y ahorro.
    gzip_comp_level 6;

    # No comprimir archivos más pequeños que este tamaño (en bytes)
    gzip_min_length 256;

    # Comprimir incluso si el cliente viene a través de un proxy
    gzip_proxied any;

    # Añadir la cabecera "Vary: Accept-Encoding"
    gzip_vary on;

    # Tipos de archivos a comprimir (Muy importante para tu API y Vue)
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Deshabilitar para navegadores antiguos que no lo soportan bien
    gzip_disable "msie6";
}
