# Habilitar Gzip a nivell global (per millorar la velocitat)
gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/x-javascript
    text/javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;
gzip_disable "msie6";

# 1. Bloc per a l'App (Vue + API Laravel)
server {
    listen 80;
    # Escolta tots els subdominis que l'ALB li enviï
    server_name app.projectegrupb.es;

    # Servir imágenes y archivos estáticos - devolver 404 real si no existen
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # On està el build de Vue dins del contenidor
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy a la API de Laravel (backend 'app' via xarxa interna de Docker)
    location /api {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy a Sanctum/CSRF per a l'autenticació
    location /sanctum {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para phpMyAdmin
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# 2. Bloc per als Backups
server {
    listen 80;
    server_name backup.projectegrupb.es;

    location / {
        root /home/backupuser/ftp/fitxers;
        autoindex on; # Llista els fitxers de backup

        # Protecció amb usuari i contrasenya
        auth_basic "Acceso Restringido a Backups";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
