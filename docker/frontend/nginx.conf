# Habilitar Gzip a nivell global
gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;
gzip_disable "msie6";


# 1. Redirecció de HTTP a HTTPS
server {
    listen 80;
    server_name projectegrupb.es app.projectegrupb.es backup.projectegrupb.es;
    return 301 https://$host$request_uri;
}

# 2. Bloc per a l'App (Vue + API Laravel) en HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name app.projectegrupb.es;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    location / {
        root   /usr/share/nginx/html; # On està el build de Vue
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy a la API de Laravel (backend 'app' via HTTP intern)
    location /api {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy a Sanctum/CSRF
    location /sanctum {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 3. Bloc per als Backups en HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name backup.projectegrupb.es;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    location / {
        root /home/backupuser/ftp/fitxers;
        autoindex on; # Permet llistar els fitxers de backup
        
        # Protecció amb usuari y contrasenya
        auth_basic "Acceso Restringido a Backups";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
